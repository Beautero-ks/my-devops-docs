
---

## 5. Pipeline GitHub Actions complet (`.github/workflows/deploy-docs.yml`)

```yaml
name: 🚀 Deploy Docusaurus to Vercel & GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Manual trigger

# Permissions minimales (bonne pratique)
permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: 20
  DOCUSAURUS_VERSION: 3.0.0

jobs:
  # JOB 1: Build (centralisé)
  build:
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build-time.outputs.time }}
    steps:
      - name: ⏱️ Start timer
        id: build-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: 🏗️ Build Docusaurus site
        run: npm run build
      
      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: build/
          retention-days: 7
      
      - name: ⏱️ End timer
        run: |
          END=$(date +%s)
          DURATION=$((END - ${{ steps.build-time.outputs.time }}))
          echo "✅ Build completed in ${DURATION} seconds"

  # JOB 2: Tests (qualité)
  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build
      
      - name: 🔍 Verify build integrity
        run: |
          test -f build/index.html || exit 1
          test -f build/404.html || exit 1
          echo "✅ Build validation passed"
      
      - name: 💬 PR comment with status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build successful** | Documentation ready for preview'
            })

  # JOB 3: Déploiement Vercel (production seulement)
  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: vercel-production
      url: https://${{ vars.VERCEL_PROJECT_NAME }}.vercel.app
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build
      
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --cwd build'
          working-directory: ./
      
      - name: ✅ Notify deployment
        run: |
          echo "✅ Deployed to Vercel: https://${{ vars.VERCEL_PROJECT_NAME }}.vercel.app"

  # JOB 4: Déploiement GitHub Pages
  deploy-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    permissions:
      contents: write
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "📚 Deploy docs - ${{ github.sha }}"
      
      - name: ✅ Notify deployment
        run: |
          echo "✅ Deployed to GitHub Pages: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

  # JOB 5: Rapport final
  report:
    needs: [build, deploy-vercel, deploy-gh-pages]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push'
    steps:
      - name: 📊 Generate deployment report
        run: |
          echo "## 🎉 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ✅ Success | https://${{ vars.VERCEL_PROJECT_NAME }}.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Pages | ✅ Success | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} |" >> $GITHUB_STEP_SUMMARY